<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07090e">
  <title>Pikap — Vinyl Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-display antialiased">
  <div id="app" class="app-shell min-h-[100dvh] flex flex-col items-center justify-center px-5 py-8 safe-area">
    <header class="w-full max-w-md text-center mb-8 opacity-0" id="header">
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/35 font-mono mb-2">NFC Vinyl</p>
      <h1 class="text-lg font-light text-white/90 tracking-wide">Pikap Player</h1>
    </header>

    <main class="w-full max-w-md flex flex-col items-center">
      <!-- Turntable -->
      <div class="turntable-base relative w-full aspect-square max-w-[min(88vw,340px)]" id="turntable">
        <!-- Tonearm assembly -->
        <div class="tonearm-pivot absolute top-[6%] right-[8%] z-20" id="tonearm-pivot">
          <svg class="tonearm-svg" viewBox="0 0 120 160" width="72" height="96" aria-hidden="true">
            <defs>
              <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3a3f4a"/>
                <stop offset="50%" stop-color="#1e2229"/>
                <stop offset="100%" stop-color="#0f1115"/>
              </linearGradient>
              <filter id="armShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
              </filter>
            </defs>
            <!-- Counterweight -->
            <rect x="52" y="4" width="16" height="22" rx="3" fill="url(#armGrad)" filter="url(#armShadow)"/>
            <!-- Arm tube -->
            <rect x="57" y="24" width="6" height="88" rx="3" fill="url(#armGrad)" filter="url(#armShadow)"/>
            <!-- Headshell -->
            <path d="M52 108 L68 108 L72 128 L48 128 Z" fill="#141820" filter="url(#armShadow)"/>
            <!-- Stylus -->
            <line x1="60" y1="128" x2="60" y2="142" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="60" cy="144" r="2" fill="#e8d48b"/>
          </svg>
        </div>

        <!-- Platter -->
        <div class="platter-ring absolute inset-[8%] rounded-full" aria-hidden="true"></div>

        <!-- Vinyl disc -->
        <div class="vinyl-disc absolute inset-[12%] rounded-full" id="vinyl">
          <div class="vinyl-grooves absolute inset-0 rounded-full" aria-hidden="true"></div>
          <div class="vinyl-shine absolute inset-0 rounded-full pointer-events-none" aria-hidden="true"></div>
          <div class="vinyl-label absolute inset-[28%] rounded-full overflow-hidden shadow-inner">
            <img id="cover" src="" alt="" class="w-full h-full object-cover" width="300" height="300">
          </div>
          <div class="spindle absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full" aria-hidden="true"></div>
        </div>
      </div>

      <!-- Track info -->
      <div class="track-info mt-8 text-center min-h-[4.5rem] flex flex-col items-center justify-center" id="track-info">
        <h2 class="text-xl font-medium text-white/95 tracking-tight opacity-0 translate-y-2" id="song-title"></h2>
        <p class="text-sm text-white/45 mt-1 opacity-0 translate-y-2" id="artist-name"></p>
      </div>

      <!-- Control -->
      <button
        type="button"
        id="play-btn"
        class="play-btn mt-6 px-10 py-4 rounded-full text-sm font-medium tracking-wide transition-transform active:scale-[0.97] focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-400/50 focus-visible:ring-offset-2 focus-visible:ring-offset-transparent"
        aria-pressed="false"
        aria-label="Play vinyl"
      >
        <span id="btn-label">Play Vinyl</span>
      </button>
    </main>

    <footer class="mt-auto pt-10 text-[10px] text-white/20 font-mono tracking-widest uppercase">
      <span id="track-id">hit-001</span>
    </footer>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
