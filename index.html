<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B263B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pikap</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['DM Sans', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-display antialiased">
  <div id="app" class="app-shell">
    <main class="player-stage">
      <div class="turntable-base" id="turntable">
        
        <button
          type="button"
          class="tonearm-pivot"
          id="tonearm-pivot"
          aria-label="Plak iğnesine dokun"
          aria-pressed="false"
        >
          <svg class="tonearm-svg" viewBox="0 0 120 160" aria-hidden="true">
            <defs>
              <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3a3f4a"></stop>
                <stop offset="50%" stop-color="#1e2229"></stop>
                <stop offset="100%" stop-color="#0f1115"></stop>
              </linearGradient>
              <filter id="armShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"></feDropShadow>
              </filter>
            </defs>
            <rect x="52" y="4" width="16" height="22" rx="3" fill="url(#armGrad)" filter="url(#armShadow)"></rect>
            <rect x="57" y="24" width="6" height="88" rx="3" fill="url(#armGrad)" filter="url(#armShadow)"></rect>
            <path d="M52 108 L68 108 L72 128 L48 128 Z" fill="#141820" filter="url(#armShadow)"></path>
            <line x1="60" y1="128" x2="60" y2="142" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"></line>
            <circle cx="60" cy="144" r="2" fill="#e8d48b"></circle>
            <circle cx="60" cy="132" r="22" class="stylus-hit" fill="transparent"></circle>
          </svg>
        </button>

        <div class="platter-ring" aria-hidden="true"></div>

        <div class="vinyl-disc" id="vinyl">
          <div class="vinyl-grooves" aria-hidden="true"></div>
          <div class="vinyl-shine" aria-hidden="true"></div>
          <div class="vinyl-label">
            <img id="cover" src="" alt="" width="300" height="300">
          </div>
          <div class="spindle" aria-hidden="true"></div>
        </div>
      </div>

      <div class="track-info" id="track-info">
        <p class="track-artist" id="artist-name"></p>
        <h1 class="track-song" id="song-title"></h1>
      </div>
    </main>
  </div>

  <audio id="audio-player" preload="none" crossorigin="anonymous"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
